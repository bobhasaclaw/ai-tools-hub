  <style>
    /* Premium Design System - IDENTICAL to index.html */
    :root {
      --bg-dark: #030407;
      --bg-card: #0c0c14;
      --bg-card-hover: #12121e;
      --text-primary: #fafafa;
      --text-secondary: #8b8b9e;
      --text-muted: #5c5c6e;
      --accent-primary: #7c3aed;
      --accent-secondary: #a855f7;
      --accent-glow: rgba(124, 58, 237, 0.4);
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(124, 58, 237, 0.3);
      --glass: rgba(255,255,255,0.02);
      --success: #10b981;
      --rating: #fbbf24;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }
    
    /* Animated Background - IDENTICAL */
    .bg-orbs {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: -1;
    }
    
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: float 20s ease-in-out infinite;
    }
    
    .orb-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent-primary), transparent 70%);
      top: -200px;
      left: -100px;
      opacity: 0.35;
    }
    
    .orb-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #0ea5e9, transparent 70%);
      top: 40%;
      right: -150px;
      opacity: 0.25;
      animation-delay: -7s;
    }
    
    .orb-3 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--accent-secondary), transparent 70%);
      bottom: -100px;
      left: 30%;
      opacity: 0.2;
      animation-delay: -14s;
    }
    
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }
    
    /* Navigation - IDENTICAL to index.html */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 72px;
      background: rgba(3, 4, 7, 0.8);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      display: flex;
      align-items: center;
    }
    
    nav .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    
    .nav-links {
      display: flex;
      align-items: center;
      gap: 40px;
      list-style: none;
    }
    
    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: color 0.2s;
      position: relative;
    }
    
    .nav-links a:hover {
      color: var(--text-primary);
    }
    
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--accent-primary);
      transition: width 0.3s;
    }
    
    .nav-links a:hover::after {
      width: 100%;
    }
    
    /* Hero */
    .hero {
      padding: 160px 0 60px;
      text-align: center;
    }
    
    .hero h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }
    
    .hero p {
      font-size: 1.125rem;
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto;
    }
    
    /* Search */
    .search-wrapper {
      max-width: 600px;
      margin: 40px auto;
    }
    
    .search-box {
      position: relative;
    }
    
    .search-box input {
      width: 100%;
      padding: 20px 24px 20px 56px;
      font-size: 1rem;
      font-family: inherit;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text-primary);
      outline: none;
      transition: all 0.3s;
    }
    
    .search-box input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.15), 0 8px 32px rgba(0,0,0,0.3);
    }
    
    .search-box input::placeholder {
      color: var(--text-muted);
    }
    
    .search-box .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.2rem;
    }
    
    /* Tools Grid */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      padding: 40px 0 80px;
    }
    
    .tool-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      display: block;
      position: relative;
      overflow: hidden;
    }
    
    .tool-card-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 20px 20px 0 0;
    }
    
    /* Favorite Button */
    .favorite-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0, 0, 0, 0.5);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.2s;
      z-index: 10;
    }
    
    .favorite-btn:hover {
      background: rgba(0, 0, 0, 0.7);
      transform: scale(1.1);
    }
    
    .tool-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 60px rgba(124, 58, 237, 0.15);
    }
    
    .tool-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 0 28px;
      padding-top: 20px;
    }
    
    .visit-btn {
      display: block;
      width: calc(100% - 56px);
      margin: 0 28px 20px;
      padding: 10px 16px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .visit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    
    .tool-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--bg-card), var(--bg-card-hover));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
    }
    
    .tool-rating {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--rating);
      font-weight: 600;
      font-size: 0.9rem;
    }
    
    .tool-name {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text-primary);
    }
    
    .tool-category {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent-primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    
    .tool-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .tool-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    
    .tool-price {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--success);
    }
    
    .tool-reviews {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    
    /* Best For Badge */
    .tool-badges {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    
    .best-for-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    
    .badge-free {
      background: rgba(16, 185, 129, 0.15);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    
    .badge-paid {
      background: rgba(14, 165, 233, 0.15);
      color: #0ea5e9;
      border: 1px solid rgba(14, 165, 233, 0.3);
    }
    
    .badge-premium {
      background: rgba(124, 58, 237, 0.15);
      color: #a855f7;
      border: 1px solid rgba(124, 58, 237, 0.3);
    }
    
    .badge-open-source {
      background: rgba(251, 191, 36, 0.15);
      color: #fbbf24;
      border: 1px solid rgba(251, 191, 36, 0.3);
    }
    
    /* Footer - IDENTICAL to index.html */
    footer {
      border-top: 1px solid var(--border);
      padding: 48px 0;
    }

      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .footer-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .footer-logo {

      height: 32px;

      display: flex;
      align-items: center;

      font-size: 0.875rem;
      transition: color 0.2s;
    }
    
    .footer-links a:hover {
      color: var(--text-primary);
    }
    
    @media (max-width: 768px) {
      .hero h1 { font-size: 2rem; }
      .tools-grid { grid-template-columns: 1fr; }
      footer .container { flex-direction: column; gap: 24px; text-align: center; }

    ];
    
    // Image mapping for tool thumbnails
    const toolImages = {
      "ChatGPT": "chatgpt.jpg", "Claude": "claude.jpg", "Midjourney": "midjourney.jpg",
      "DALL-E": "dall-e.jpg", "Stable Diffusion": "stable-diffusion.jpg", "GitHub Copilot": "github-copilot.jpg",

      "Leonardo.ai": "leonardoai.jpg", "Canva AI": "canva-ai.jpg", "Notion AI": "notion-ai.jpg",
      "Jasper": "jasper.jpg", "Copy.ai": "copyai.jpg", "Grammarly": "grammarly.jpg", "Quillbot": "quillbot.jpg",
      "Adobe Firefly": "adobe-firefly.jpg", "Sora": "sora.jpg", "Suno AI": "suno-ai.jpg", "Kling AI": "kling-ai.jpg",
      "Llama": "llama.jpg", "Mistral": "mistral.jpg", "Microsoft Copilot": "microsoft-copilot.jpg",
      "Stability AI": "stability-ai.jpg", "InVideo AI": "invideo.jpg", "Otter.ai": "otter-ai.jpg",
      "Anyword": "anyword.jpg", "Article Forge": "articleforge.jpg", "Chatsonic": "chatsonic.jpg",
      "Cohere": "cohere.jpg", "Descript": "descript.jpg", "Frase": "frase.jpg", "Hugging Face": "huggingface.jpg",
      "Lumen5": "lumen5.jpg", "Pictory": "pictory.jpg", "Pika": "pika.jpg", "Rytr": "rytr.jpg",
      "Simplified": "simplified.jpg", "VEED": "veed.jpg", "Wordtune": "wordtune.jpg", "Writesonic": "writesonic.jpg"
    };
    tools.forEach(tool => { tool.img = toolImages[tool.name] || tool.name.toLowerCase().replace(/\s+/g, '-') + '.jpg'; });
    
    // Favorites management
    const FAVORITES_KEY = 'ai-tools-hub-favorites';
    
    function getFavorites() {
      try {
        return JSON.parse(localStorage.getItem(FAVORITES_KEY)) || [];
      } catch {
        return [];
      }
    }
    
    function toggleFavorite(toolName, event) {
      event.preventDefault();
      event.stopPropagation();
      const favorites = getFavorites();
      const index = favorites.indexOf(toolName);
      if (index > -1) {
        favorites.splice(index, 1);
      } else {
        favorites.push(toolName);
      }
      localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
      renderTools();
      updateFavoritesButton();
    }
    
    function updateFavoritesButton() {
      const favBtn = document.querySelector('[data-category="favorites"]');
      if (favBtn) {
        const count = getFavorites().length;
        favBtn.innerHTML = count > 0 ? `❤️ Favorites (${count})` : '❤️ Favorites';
      }
    }
    
    function renderTools(filteredTools = tools) {
      const favorites = getFavorites();
      const grid = document.getElementById('tools-grid');
      grid.innerHTML = filteredTools.map(tool => {
        const badgeClass = tool.priceType === 'free' ? 'badge-free' : tool.priceType === 'paid' ? 'badge-paid' : tool.priceType === 'premium' ? 'badge-premium' : 'badge-open-source';
        const isFavorite = favorites.includes(tool.name);
        const articleUrl = tool.href || '#';
        const imgName = tool.img || tool.name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '').replace(/-+/g, '-') + '.jpg';
        return `
        <a href="${articleUrl}" class="tool-card">
          <button class="favorite-btn ${isFavorite ? 'active' : ''}" onclick="toggleFavorite('${tool.name.replace(/'/g, "\\'")}', event)" title="${isFavorite ? 'Remove from favorites' : 'Add to favorites'}"></button>
          <img src="tools/images/${imgName}" alt="${tool.name}" class="tool-card-img" onerror="this.style.display='none'">
          <div class="tool-header">
            <div class="tool-icon">${tool.icon}</div>
            <div class="tool-rating">★ ${tool.rating}</div>
          </div>
          <div class="tool-name">${tool.name}</div>
          <div class="tool-badges">
            <span class="best-for-badge ${badgeClass}">Best for ${tool.bestFor}</span>
          </div>
          <div class="tool-category">${tool.category}</div>
          <p class="tool-desc">${tool.desc}</p>
          <div class="tool-footer">
            <span class="tool-price">${tool.price}</span>
            <span class="tool-reviews">${tool.reviews.toLocaleString()} reviews</span>
          </div>
          <button class="visit-btn" onclick="trackAffiliateClick('${tool.name.replace(/'/g, "\\'")}', event)" target="_blank" rel="noopener noreferrer">Visit Website →</button>
        </a>
      `}).join('');
    }
    
    // Handle search from homepage
    function handleSearch(e) {
      e.preventDefault();
      const query = document.getElementById('search').value.trim();
      if (query) {
        window.location.href = 'tools.html?q=' + encodeURIComponent(query);
      }
    }
    
    // Check for query param on page load
    document.addEventListener('DOMContentLoaded', () => {
      updateFavoritesButton();
      const params = new URLSearchParams(window.location.search);
      const query = params.get('q');
      if (query) {
        document.getElementById('search').value = query;
        renderTools(tools.filter(t => 
          t.name.toLowerCase().includes(query.toLowerCase()) || 
          t.category.toLowerCase().includes(query.toLowerCase()) ||
          t.desc.toLowerCase().includes(query.toLowerCase())
        ));
      } else {
        renderTools();
      }
    });
    
    // Update tool count
    const toolCount = document.getElementById('tool-count');
    if(toolCount) toolCount.textContent = '— ' + tools.length + ' tools';
    
    // Category filter buttons
    document.querySelectorAll('.cat-filter').forEach(btn => {
      btn.addEventListener('click', function() {
        // Update active state
        document.querySelectorAll('.cat-filter').forEach(b => {
          b.style.background = 'var(--glass)';
          b.style.color = 'var(--text-secondary)';
          b.style.borderColor = 'var(--border)';
        });
        this.style.background = 'var(--accent-primary)';
        this.style.color = 'white';
        this.style.borderColor = 'var(--accent-primary)';
        
        const category = this.dataset.category;
        if (category === 'all') {
          renderTools(tools);
        } else if (category === 'favorites') {
          const favorites = getFavorites();
          renderTools(tools.filter(t => favorites.includes(t.name)));
        } else {
          renderTools(tools.filter(t => t.category === category));
        }
      });
    });
    
    // Sorting functionality
    let currentTools = tools;
    
    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.sort-btn').forEach(b => b.style.background = 'transparent');
        this.style.background = 'var(--accent-primary)';
        
        const sortType = this.dataset.sort;
        let sorted = [...currentTools];
        
        if (sortType === 'rating') {
          sorted.sort((a, b) => b.rating - a.rating);
        } else if (sortType === 'price-low') {
          sorted.sort((a, b) => {
            const aPrice = a.price.includes('Free') ? 0 : parseInt(a.price.replace(/[^0-9]/g, '')) || 999;
            const bPrice = b.price.includes('Free') ? 0 : parseInt(b.price.replace(/[^0-9]/g, '')) || 999;
            return aPrice - bPrice;
          });
        } else if (sortType === 'price-high') {
          sorted.sort((a, b) => {
            const aPrice = a.price.includes('Free') ? 0 : parseInt(a.price.replace(/[^0-9]/g, '')) || 999;
            const bPrice = b.price.includes('Free') ? 0 : parseInt(b.price.replace(/[^0-9]/g, '')) || 999;
            return bPrice - aPrice;
          });
        } else if (sortType === 'name') {
          sorted.sort((a, b) => a.name.localeCompare(b.name));
        }
        
        renderTools(sorted);
      });
    });
  </script>
